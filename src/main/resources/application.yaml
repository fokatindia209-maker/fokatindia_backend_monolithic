server:
  address: 0.0.0.0
  port: ${PORT:8080}

spring:
  application:
    name: fokatindia

  main:
    web-application-type: reactive

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:fokatindia_super_secure_key_123456}
  expiration: 86400000

logging:
  level:
    org.springframework.security: INFO
    org.springframework.r2dbc: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always


