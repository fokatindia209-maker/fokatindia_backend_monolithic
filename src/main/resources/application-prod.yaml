spring:
  r2dbc:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.security: INFO
    org.springframework.r2dbc: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always